# PostgreSQL Database
spring.datasource.url=jdbc:postgresql://postgres:5432/stockdb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=password

# JPA configuration for PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# RabbitMQ configuration
spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.virtual-host=/

# Custom RabbitMQ settings
rabbitmq.exchange.market-data=market.data.exchange
rabbitmq.exchange.portfolio=portfolio.exchange
rabbitmq.queue.market-data-updates=market.data.updates
rabbitmq.queue.portfolio-generation=portfolio.generation
rabbitmq.queue.dead-letter=dead.letter.queue
rabbitmq.routing-key.market-data=stock.update.*

# SpringDoc OpenAPI configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Logging configuration for prod
logging.level.root=WARN
logging.level.org.andrejstrogonov.moskowstockapplicationbackend=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.amqp=INFO
logging.level.org.hibernate=WARN

# Log file configuration
logging.file.name=/var/log/application.log
logging.file.max-size=50MB
logging.file.max-history=7
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
